# Build browser WASM (wasm32-unknown-unknown) with wasm-bindgen JS glue.
# Produces the pkg/ directory needed for the playground.
# Uploads as artifact for the docs site deploy + attaches to releases.

name: Browser WASM

permissions:
  contents: write

on:
  push:
    branches: [master]
    tags:
      - '**[0-9]+.[0-9]+.[0-9]+*'
    paths:
      - 'crates/clawft-wasm/**'
      - 'crates/clawft-core/**'
      - 'crates/clawft-llm/**'
      - 'crates/clawft-tools/**'
      - 'crates/clawft-platform/**'
      - 'crates/clawft-types/**'
      - '.github/workflows/wasm-browser.yml'
  pull_request:
    paths:
      - 'crates/clawft-wasm/**'

env:
  CARGO_TERM_COLOR: always
  TARGET: wasm32-unknown-unknown
  PROFILE: release-wasm

jobs:
  build-browser-wasm:
    name: Build browser WASM + wasm-bindgen
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-browser-wasm-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-browser-wasm-

      - name: Ensure WASM target is installed
        run: rustup target add wasm32-unknown-unknown

      - name: Install wasm-bindgen-cli
        run: cargo install wasm-bindgen-cli --version 0.2.108

      - name: Build browser WASM
        run: |
          cargo build \
            --target ${{ env.TARGET }} \
            --profile ${{ env.PROFILE }} \
            -p clawft-wasm \
            --no-default-features \
            --features browser

      - name: Generate JS glue with wasm-bindgen
        run: |
          WASM_FILE="target/${{ env.TARGET }}/${{ env.PROFILE }}/clawft_wasm.wasm"
          PKG_DIR="browser-pkg"
          mkdir -p "$PKG_DIR"

          wasm-bindgen "$WASM_FILE" \
            --out-dir "$PKG_DIR" \
            --target web

          echo "## Browser WASM" >> "$GITHUB_STEP_SUMMARY"
          echo "| File | Size |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|------|" >> "$GITHUB_STEP_SUMMARY"
          for f in "$PKG_DIR"/*; do
            SIZE=$(wc -c < "$f")
            SIZE_KB=$(echo "scale=1; $SIZE / 1024" | bc)
            echo "| $(basename $f) | ${SIZE_KB} KB |" >> "$GITHUB_STEP_SUMMARY"
          done

      - name: Upload browser WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: browser-wasm-pkg
          path: browser-pkg/
          retention-days: 90

      - name: Upload to GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"

          # Package the browser WASM for release
          tar -czf "clawft-browser-wasm-${TAG}.tar.gz" -C browser-pkg .

          # Wait for release
          for i in $(seq 1 90); do
            if gh release view "$TAG" >/dev/null 2>&1; then
              echo "Release $TAG found"
              break
            fi
            echo "Waiting for release $TAG... ($i/90)"
            sleep 20
          done

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "clawft-browser-wasm-${TAG}.tar.gz" --clobber
            echo "Uploaded browser WASM to release $TAG"
          else
            echo "::warning::Release $TAG not found, skipping upload"
          fi
