<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1700" font-family="ui-sans-serif, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#475569"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="1700" fill="url(#bg)"/>

  <!-- Header -->
  <rect x="0" y="0" width="900" height="100" fill="#0f172a"/>
  <text x="450" y="45" text-anchor="middle" font-size="28" font-weight="700" fill="#f8fafc">
    EML-Transformer · Iteration 2
  </text>
  <text x="450" y="75" text-anchor="middle" font-size="15" fill="#94a3b8">
    What we built · what we measured · where EML actually fits
  </text>
  <text x="880" y="22" text-anchor="end" font-size="11" fill="#64748b">v0.6.10 · 2026-04-15</text>

  <!-- ============================================================ -->
  <!-- SECTION 1: WHAT IS THIS                                       -->
  <!-- ============================================================ -->
  <text x="40" y="140" font-size="18" font-weight="700" fill="#0f172a">1 · The substrate</text>
  <line x1="40" y1="148" x2="860" y2="148" stroke="#cbd5e1" stroke-width="1"/>

  <text x="40" y="175" font-size="13" fill="#1e293b">
    A toy attention block built from <tspan font-weight="700">five learned projections</tspan>, where each projection is one of:
  </text>

  <!-- Two cards: EML vs Baseline -->
  <g transform="translate(40, 195)">
    <!-- EML card -->
    <rect x="0" y="0" width="395" height="180" fill="#ffffff" stroke="#0ea5e9" stroke-width="2" rx="8"/>
    <text x="20" y="28" font-size="15" font-weight="700" fill="#0369a1">EML (SafeTree)</text>
    <text x="20" y="52" font-size="12" fill="#334155" font-family="ui-monospace, monospace">
      eml_safe(v·c0 + c1, |v| + c2 + 1)
    </text>
    <text x="20" y="76" font-size="12" fill="#475569">A depth-N tree of exp(x)−ln(y) operators.</text>
    <text x="20" y="94" font-size="12" fill="#475569">Universal function approximator (Odrzywolel '26).</text>
    <text x="20" y="112" font-size="12" fill="#475569">Trained weights snap to integers → closed-form.</text>
    <text x="20" y="130" font-size="12" fill="#475569">No backprop. No autograd. Coordinate descent only.</text>
    <text x="20" y="156" font-size="11" fill="#0ea5e9" font-style="italic">Bet: interpretable scalar functions.</text>

    <!-- Baseline card -->
    <rect x="425" y="0" width="395" height="180" fill="#ffffff" stroke="#64748b" stroke-width="2" rx="8"/>
    <text x="445" y="28" font-size="15" font-weight="700" fill="#334155">Baseline (affine)</text>
    <text x="445" y="52" font-size="12" fill="#334155" font-family="ui-monospace, monospace">
      W·x + b
    </text>
    <text x="445" y="76" font-size="12" fill="#475569">A plain matrix multiply per head.</text>
    <text x="445" y="94" font-size="12" fill="#475569">Standard transformer math (Vaswani '17).</text>
    <text x="445" y="112" font-size="12" fill="#475569">Weights are opaque float tensors.</text>
    <text x="445" y="130" font-size="12" fill="#475569">Same coordinate-descent optimizer (fairness).</text>
    <text x="445" y="156" font-size="11" fill="#64748b" font-style="italic">Reference: well-understood, no surprises.</text>
  </g>

  <!-- ============================================================ -->
  <!-- SECTION 2: ARCHITECTURE                                       -->
  <!-- ============================================================ -->
  <text x="40" y="430" font-size="18" font-weight="700" fill="#0f172a">2 · Forward pass — what attention does</text>
  <line x1="40" y1="438" x2="860" y2="438" stroke="#cbd5e1" stroke-width="1"/>

  <!-- Architecture flow diagram -->
  <g transform="translate(40, 460)">
    <!-- Input -->
    <rect x="350" y="0" width="120" height="40" fill="#1e293b" stroke="#0f172a" rx="6"/>
    <text x="410" y="25" text-anchor="middle" font-size="13" font-weight="600" fill="#f8fafc">input x</text>
    <text x="410" y="58" text-anchor="middle" font-size="10" fill="#64748b">seq_len × d_model</text>

    <!-- Three projections -->
    <g transform="translate(0, 80)">
      <!-- Q -->
      <rect x="60" y="0" width="180" height="60" fill="#ffffff" stroke="#0ea5e9" stroke-width="2" rx="6"/>
      <text x="150" y="22" text-anchor="middle" font-size="13" font-weight="600" fill="#0369a1">Q projection</text>
      <text x="150" y="40" text-anchor="middle" font-size="10" fill="#475569">"what each position asks"</text>
      <text x="150" y="54" text-anchor="middle" font-size="10" fill="#94a3b8">→ seq_len × d_k</text>

      <!-- K -->
      <rect x="320" y="0" width="180" height="60" fill="#ffffff" stroke="#0ea5e9" stroke-width="2" rx="6"/>
      <text x="410" y="22" text-anchor="middle" font-size="13" font-weight="600" fill="#0369a1">K projection</text>
      <text x="410" y="40" text-anchor="middle" font-size="10" fill="#475569">"what each position offers"</text>
      <text x="410" y="54" text-anchor="middle" font-size="10" fill="#94a3b8">→ seq_len × d_k</text>

      <!-- V -->
      <rect x="580" y="0" width="180" height="60" fill="#ffffff" stroke="#0ea5e9" stroke-width="2" rx="6"/>
      <text x="670" y="22" text-anchor="middle" font-size="13" font-weight="600" fill="#0369a1">V projection</text>
      <text x="670" y="40" text-anchor="middle" font-size="10" fill="#475569">"what gets contributed"</text>
      <text x="670" y="54" text-anchor="middle" font-size="10" fill="#94a3b8">→ seq_len × d_k</text>

      <!-- Connectors from input to Q/K/V -->
      <line x1="380" y1="-40" x2="150" y2="0" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
      <line x1="410" y1="-40" x2="410" y2="0" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
      <line x1="440" y1="-40" x2="670" y2="0" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
    </g>

    <!-- Score and softmax -->
    <g transform="translate(0, 180)">
      <rect x="150" y="0" width="260" height="50" fill="#fef3c7" stroke="#d97706" stroke-width="2" rx="6"/>
      <text x="280" y="22" text-anchor="middle" font-size="13" font-weight="600" fill="#92400e">scores = Q · Kᵀ / √d_k</text>
      <text x="280" y="38" text-anchor="middle" font-size="10" fill="#78350f">"how much does i want j?"</text>

      <rect x="450" y="0" width="280" height="50" fill="#fef3c7" stroke="#d97706" stroke-width="2" rx="6"/>
      <text x="590" y="22" text-anchor="middle" font-size="13" font-weight="600" fill="#92400e">attn = softmax(scores)</text>
      <text x="590" y="38" text-anchor="middle" font-size="10" fill="#78350f">rows sum to 1 → routing weights</text>

      <line x1="410" y1="25" x2="450" y2="25" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
      <line x1="150" y1="-50" x2="200" y2="0" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
      <line x1="410" y1="-50" x2="360" y2="0" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
    </g>

    <!-- Blend V and output -->
    <g transform="translate(0, 270)">
      <rect x="200" y="0" width="240" height="50" fill="#dcfce7" stroke="#16a34a" stroke-width="2" rx="6"/>
      <text x="320" y="22" text-anchor="middle" font-size="13" font-weight="600" fill="#15803d">context = attn · V</text>
      <text x="320" y="38" text-anchor="middle" font-size="10" fill="#166534">weighted blend per position</text>

      <rect x="470" y="0" width="240" height="50" fill="#e0e7ff" stroke="#4338ca" stroke-width="2" rx="6"/>
      <text x="590" y="22" text-anchor="middle" font-size="13" font-weight="600" fill="#3730a3">output projection</text>
      <text x="590" y="38" text-anchor="middle" font-size="10" fill="#312e81">→ seq_len × d_model</text>

      <line x1="440" y1="25" x2="470" y2="25" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
      <line x1="670" y1="-50" x2="320" y2="0" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
      <line x1="590" y1="-50" x2="320" y2="0" stroke="#475569" stroke-width="1" stroke-dasharray="3,3"/>
    </g>

    <!-- Footnote about substrate -->
    <text x="410" y="360" text-anchor="middle" font-size="11" fill="#64748b" font-style="italic">
      Each blue box is one of the 5 trainable sub-models. They are SafeTrees in EML mode, plain affines in baseline mode.
    </text>
  </g>

  <!-- ============================================================ -->
  <!-- SECTION 3: HEAD-TO-HEAD RESULTS                              -->
  <!-- ============================================================ -->
  <text x="40" y="900" font-size="18" font-weight="700" fill="#0f172a">3 · Head-to-head results — same training, same data, same seed</text>
  <line x1="40" y1="908" x2="860" y2="908" stroke="#cbd5e1" stroke-width="1"/>

  <text x="40" y="935" font-size="12" fill="#475569">
    Shape: <tspan font-family="ui-monospace, monospace" fill="#1e293b">d_model=4 · d_k=2 · seq_len=2 · depth=3</tspan> · 5,000 trials × 3 rounds · per-position-mean target
  </text>

  <!-- Results table -->
  <g transform="translate(40, 960)">
    <!-- Header row -->
    <rect x="0" y="0" width="820" height="40" fill="#1e293b"/>
    <text x="20" y="26" font-size="14" font-weight="700" fill="#f8fafc">metric</text>
    <text x="430" y="26" text-anchor="middle" font-size="14" font-weight="700" fill="#7dd3fc">EML (SafeTree)</text>
    <text x="660" y="26" text-anchor="middle" font-size="14" font-weight="700" fill="#cbd5e1">Baseline (affine)</text>

    <!-- Row 1: Params -->
    <rect x="0" y="40" width="820" height="36" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="20" y="63" font-size="13" fill="#1e293b">Trainable parameters</text>
    <text x="430" y="63" text-anchor="middle" font-size="13" font-family="ui-monospace, monospace" fill="#0c4a6e">352</text>
    <text x="660" y="63" text-anchor="middle" font-size="13" font-family="ui-monospace, monospace" fill="#0f172a" font-weight="700">148</text>
    <text x="780" y="63" text-anchor="end" font-size="11" fill="#16a34a">2.4× fewer</text>

    <!-- Row 2: Baseline MSE -->
    <rect x="0" y="76" width="820" height="36" fill="#f8fafc" stroke="#e2e8f0"/>
    <text x="20" y="99" font-size="13" fill="#1e293b">Starting MSE (untrained)</text>
    <text x="430" y="99" text-anchor="middle" font-size="13" font-family="ui-monospace, monospace" fill="#0c4a6e">1.4783</text>
    <text x="660" y="99" text-anchor="middle" font-size="13" font-family="ui-monospace, monospace" fill="#0f172a">0.2331</text>
    <text x="780" y="99" text-anchor="end" font-size="11" fill="#64748b">baseline starts closer</text>

    <!-- Row 3: Final MSE -->
    <rect x="0" y="112" width="820" height="36" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="20" y="135" font-size="13" fill="#1e293b">Final MSE (after training)</text>
    <text x="430" y="135" text-anchor="middle" font-size="13" font-family="ui-monospace, monospace" fill="#0c4a6e">1.5419</text>
    <text x="660" y="135" text-anchor="middle" font-size="13" font-family="ui-monospace, monospace" fill="#0f172a" font-weight="700">0.0550</text>
    <text x="780" y="135" text-anchor="end" font-size="11" fill="#16a34a">28× lower</text>

    <!-- Row 4: MSE reduction -->
    <rect x="0" y="148" width="820" height="36" fill="#f8fafc" stroke="#e2e8f0"/>
    <text x="20" y="171" font-size="13" fill="#1e293b">MSE reduction</text>
    <text x="430" y="171" text-anchor="middle" font-size="13" font-family="ui-monospace, monospace" fill="#dc2626" font-weight="700">−4.3%</text>
    <text x="660" y="171" text-anchor="middle" font-size="13" font-family="ui-monospace, monospace" fill="#16a34a" font-weight="700">+76.4%</text>
    <text x="780" y="171" text-anchor="end" font-size="11" fill="#16a34a">baseline learns</text>

    <!-- Row 5: p99 latency -->
    <rect x="0" y="184" width="820" height="36" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="20" y="207" font-size="13" fill="#1e293b">Forward pass p99 latency</text>
    <text x="430" y="207" text-anchor="middle" font-size="13" font-family="ui-monospace, monospace" fill="#0c4a6e">1161 ns</text>
    <text x="660" y="207" text-anchor="middle" font-size="13" font-family="ui-monospace, monospace" fill="#0f172a" font-weight="700">360 ns</text>
    <text x="780" y="207" text-anchor="end" font-size="11" fill="#16a34a">3.2× faster</text>

    <!-- Footer -->
    <rect x="0" y="220" width="820" height="40" fill="#fef2f2" stroke="#fecaca"/>
    <text x="20" y="245" font-size="13" fill="#7f1d1d">
      <tspan font-weight="700">Verdict at this scale:</tspan>
      <tspan> baseline plain affine wins on every measurable axis.</tspan>
    </text>
  </g>

  <!-- ============================================================ -->
  <!-- SECTION 4: WHERE EML ACTUALLY FITS                           -->
  <!-- ============================================================ -->
  <text x="40" y="1280" font-size="18" font-weight="700" fill="#0f172a">4 · Where EML actually fits</text>
  <line x1="40" y1="1288" x2="860" y2="1288" stroke="#cbd5e1" stroke-width="1"/>

  <text x="40" y="1315" font-size="13" fill="#1e293b">
    The measurement above isn't a failure — it's the <tspan font-weight="700">substrate boundary made visible</tspan>.
  </text>

  <!-- Two columns: EML wins / EML loses -->
  <g transform="translate(40, 1335)">
    <!-- EML WINS column -->
    <rect x="0" y="0" width="395" height="240" fill="#ecfdf5" stroke="#10b981" stroke-width="2" rx="8"/>
    <text x="20" y="28" font-size="14" font-weight="700" fill="#065f46">✓ EML wins when:</text>
    <text x="20" y="55" font-size="12" fill="#064e3b">• Output is <tspan font-weight="700">scalar or low-dim vector</tspan></text>
    <text x="20" y="78" font-size="12" fill="#064e3b">• Input has <tspan font-weight="700">3-10 features</tspan>, not hundreds</text>
    <text x="20" y="101" font-size="12" fill="#064e3b">• Target is <tspan font-weight="700">closed-form expressible</tspan></text>
    <text x="20" y="124" font-size="12" fill="#064e3b">• Param count is <tspan font-weight="700">30-80</tspan>, not thousands</text>
    <text x="20" y="147" font-size="12" fill="#064e3b">• Interpretability matters more than throughput</text>
    <text x="20" y="170" font-size="12" fill="#064e3b">• ExoChain auditability is required</text>
    <text x="20" y="200" font-size="11" fill="#047857" font-style="italic">12 production WeftOS wrappers do this today —</text>
    <text x="20" y="216" font-size="11" fill="#047857" font-style="italic">QueryFusion, CausalCollapse, SurpriseScorer, etc.</text>

    <!-- EML LOSES column -->
    <rect x="425" y="0" width="395" height="240" fill="#fef2f2" stroke="#dc2626" stroke-width="2" rx="8"/>
    <text x="445" y="28" font-size="14" font-weight="700" fill="#991b1b">✗ EML loses when:</text>
    <text x="445" y="55" font-size="12" fill="#7f1d1d">• Output is a <tspan font-weight="700">sequence or large vector</tspan></text>
    <text x="445" y="78" font-size="12" fill="#7f1d1d">• Input is <tspan font-weight="700">high-dimensional</tspan> (32+ features)</text>
    <text x="445" y="101" font-size="12" fill="#7f1d1d">• Target requires <tspan font-weight="700">composition across layers</tspan></text>
    <text x="445" y="124" font-size="12" fill="#7f1d1d">• Param count is <tspan font-weight="700">hundreds-thousands</tspan></text>
    <text x="445" y="147" font-size="12" fill="#7f1d1d">• Throughput / SIMD / GPU matter</text>
    <text x="445" y="170" font-size="12" fill="#7f1d1d">• Backprop already works fine</text>
    <text x="445" y="200" font-size="11" fill="#b91c1c" font-style="italic">Sequence modeling, full attention layers,</text>
    <text x="445" y="216" font-size="11" fill="#b91c1c" font-style="italic">deep stacks → use plain affine instead.</text>
  </g>

  <!-- The takeaway -->
  <g transform="translate(40, 1605)">
    <rect x="0" y="0" width="820" height="80" fill="#0f172a" rx="8"/>
    <text x="20" y="28" font-size="14" font-weight="700" fill="#fbbf24">The takeaway</text>
    <text x="20" y="52" font-size="13" fill="#f8fafc">
      WeftOS bet is <tspan font-weight="700" fill="#fbbf24">both</tspan>:
      baseline-style attention for the data plane,
    </text>
    <text x="20" y="70" font-size="13" fill="#f8fafc">
      EML for the control-plane scalar decisions around it.
      Iteration 3 attention work has been <tspan font-style="italic">deferred with cause</tspan>.
    </text>
  </g>
</svg>
